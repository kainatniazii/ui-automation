name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Gating job: the stable suites (saucedemo, dropdowns, uploaddownload).
  # This is the check that protects main, so it must not depend on flaky
  # third-party practice sites.
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Run inside Microsoft's official Playwright image, which already has all
    # the Linux system libraries the browsers need. This avoids the fragile
    # "playwright install --with-deps" apt step that was failing in CI.
    # Keep this tag's version in sync with @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    # The container runs as root but its home dir is owned by another user,
    # which stops Firefox from launching. Pointing HOME at /root fixes it.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run stable tests
        run: npx playwright test --grep-invert @external
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Non-blocking job: the @external suites (eventhub, libraryapi) hit live
  # third-party sites and are intermittently flaky. continue-on-error lets
  # them run for visibility without ever failing the workflow / reddening main.
  external-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run external tests (non-blocking)
        run: npx playwright test --grep @external
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-external
          path: playwright-report/
          retention-days: 30
